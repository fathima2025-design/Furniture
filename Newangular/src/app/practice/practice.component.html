<button (click)="toggleLogin()">
  {{ isLoggedIn ? 'Log Out' : 'Log In' }}
</button>

<div *ngIf="isLoggedIn; else notLoggedIn">
  ✅ Welcome! You are logged in.
</div>

<ng-template #notLoggedIn>
  ❌ Please log in to continue.
</ng-template>
